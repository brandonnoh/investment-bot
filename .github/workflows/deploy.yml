name: Deploy to Mac mini

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Next.js 빌드
        working-directory: web-next
        run: |
          npm install
          npm run build

      - name: mc-web 배포
        run: |
          docker cp web-next/.next/standalone/. mc-web:/app/
          docker cp web-next/.next/static/. mc-web:/app/.next/static/
          docker restart mc-web

      - name: investment-bot 배포
        run: |
          docker compose up -d --build investment-bot

      - name: 헬스 체크
        run: |
          curl -sf http://localhost:3000 -o /dev/null || (echo "mc-web 헬스체크 실패" && exit 1)
          for i in $(seq 1 6); do
            curl -sf http://localhost:8421/api/status -o /dev/null && break
            echo "Flask API 대기 중... ($i/6)"
            sleep 10
            if [ $i -eq 6 ]; then echo "Flask API 헬스체크 실패" && exit 1; fi
          done
          echo "배포 성공"
