services:
  investment-bot:
    build: .
    container_name: investment-bot
    restart: unless-stopped
    ports:
      - "8421:8421"
    volumes:
      - ./db:/app/db
      - ./output:/app/output
      - ./logs:/app/logs
      - ./docs:/app/docs
      - ~/.claude:/root/.claude-host:ro
      - ~/.claude.json:/root/.claude-host.json:ro
      - ./web:/app/web
      - ./analysis:/app/analysis
      - ./data:/app/data
      - ./reports:/app/reports
      - ./scripts:/app/scripts
      - ./config.py:/app/config.py
      - ./run_pipeline.py:/app/run_pipeline.py
    environment:
      - TZ=Asia/Seoul
    env_file:
      - .env

  mc-web:
    build: ./web-next
    container_name: mc-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PYTHON_API_URL=http://investment-bot:8421
      - HOSTNAME=0.0.0.0
    depends_on:
      - investment-bot
