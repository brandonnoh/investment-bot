services:
  investment-bot:
    build: .
    container_name: investment-bot
    restart: unless-stopped
    ports:
      - "8421:8421"
    volumes:
      - ./db:/app/db
      - ./output:/app/output
      - ./logs:/app/logs
    env_file:
      - .env

  mc-web:
    build: ./web-next
    container_name: mc-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PYTHON_API_URL=http://investment-bot:8421
    depends_on:
      - investment-bot
