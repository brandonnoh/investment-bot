server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: investment-bot
    static_configs:
      - targets:
          - localhost
        labels:
          job: investment-bot
          __path__: /logs/*.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '.*/(?P<log_name>[^/]+)\.log$'
      - labels:
          log_name:
      - regex:
          expression: '(?i)(?P<level>ERROR|WARNING|WARN|INFO|DEBUG|CRITICAL)'
      - labels:
          level:
